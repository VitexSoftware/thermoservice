<html>
    <head>
        <meta http-equiv="refresh" content="30">
        <title>{{ title }}</title>
        <style>
            body {
                background-color: #1a1a1a;
                color: #e0e0e0;
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            .temp {
                color: #ff4444;
                font-size: 200px;
                font-weight: bold;
            }
            a {
                color: #4a9eff;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            .magnymph {
                position: fixed;
                bottom: 10px;
                right: 10px;
                opacity: 0.3;
                transition: opacity 0.3s;
            }
            .magnymph:hover {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <img src="/logo.svg" title="ThermoService logo" style="width: 20%">
        <h1>Thermoservice on {{ hostname }}!</h1>
        {{ when }}
        <div class="temp">{{ temperature }}&deg;</div>
        <div><a href="/celsius">Celsius Temperature Endpoint</a></div>
        <div><a href="https://github.com/VitexSoftware/thermoservice" target="_blank">Project Page</a></div>
        <div class="magnymph">
            <a href="https://vitexsoftware.com" target="_blank">
                <img src="https://vitexsoftware.com/images/magnymph.gif" alt="VitexSoftware" style="width: 80px;">
            </a>
        </div>
    </body>
</html>
